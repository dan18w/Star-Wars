<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jedi o Sith – Holocron Galáctico</title>
  <link rel="icon" type="image/png" href="https://loodibee.com/wp-content/uploads/Star-Wars-transparent-logo-1024x1024.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root {
      --jedi:  #4fc3f7;
      --sith:  #ef5350;
      --gold:  #ffe81f;
      --bg:    #05070f;
      --card:  rgba(255,255,255,0.04);
      --border:rgba(255,255,255,0.10);
    }

    body {
      margin: 0;
      font-family: 'Crimson Text', Georgia, serif;
      color: #eaeaea;
      background: var(--bg);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== STAR BACKGROUND ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, white, transparent),
        radial-gradient(1px 1px at 30% 80%, white, transparent),
        radial-gradient(1px 1px at 70% 10%, white, transparent),
        radial-gradient(1px 1px at 90% 50%, white, transparent),
        radial-gradient(1px 1px at 50% 35%, white, transparent),
        radial-gradient(1px 1px at 20% 60%, white, transparent),
        radial-gradient(1px 1px at 80% 75%, white, transparent),
        radial-gradient(1px 1px at 45% 90%, white, transparent),
        radial-gradient(1px 1px at 65% 45%, white, transparent);
      opacity: 0.35;
      animation: starsMove 80s linear infinite;
      z-index: 0;
    }

    @keyframes starsMove {
      from { transform: translateY(0); }
      to   { transform: translateY(-1000px); }
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(5, 7, 15, 0.95);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
    }
    header img { width: 50px; height: auto; }
    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--gold);
      margin: 0;
    }

    /* ===== CONTAINER ===== */
    .container {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: auto;
      padding: 30px 14px 60px;
    }

    /* ===== INTRO ===== */
    .intro {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.7s ease both;
    }
    .intro h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .intro p {
      font-size: 1rem;
      opacity: 0.7;
      max-width: 480px;
      margin: auto;
      line-height: 1.6;
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      margin-bottom: 20px;
      animation: fadeDown 0.7s 0.1s ease both;
    }
    .progress-label {
      font-size: 0.78rem;
      opacity: 0.5;
      margin-bottom: 5px;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 4px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ===== QUIZ CARD ===== */
    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      animation: cardIn 0.45s ease both;
    }

    @keyframes cardIn {
      from { opacity:0; transform:scale(0.97) translateY(10px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    /* número de pregunta */
    .q-number {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: var(--gold);
      opacity: 0.6;
      margin-bottom: 10px;
    }

    /* texto pregunta */
    #question {
      font-size: 1.15rem;
      margin-bottom: 22px;
      color: #f0f0f0;
      line-height: 1.5;
    }

    /* botones de respuesta */
    #answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #answers button {
      width: 100%;
      padding: 12px 16px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: #eaeaea;
      cursor: pointer;
      transition: 0.25s ease;
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      text-align: left;
    }
    #answers button:hover {
      border-color: var(--gold);
      transform: translateX(4px);
      background: rgba(255,232,31,0.07);
    }

    /* ===== BARRA LATERAL JEDI / SITH ===== */
    .side-indicator {
      display: flex;
      justify-content: space-between;
      margin-top: 22px;
      gap: 10px;
    }
    .side-bar {
      flex: 1;
      padding: 10px 14px;
      border-radius: 9px;
      border: 1px solid transparent;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-align: center;
      transition: 0.4s;
    }
    .side-bar.jedi {
      border-color: rgba(79,195,247,0.3);
      color: var(--jedi);
      background: rgba(79,195,247,0.05);
    }
    .side-bar.sith {
      border-color: rgba(239,83,80,0.3);
      color: var(--sith);
      background: rgba(239,83,80,0.05);
    }
    .side-bar .bar-inner {
      height: 3px;
      border-radius: 3px;
      margin-top: 6px;
      transition: width 0.5s ease;
    }
    .side-bar.jedi .bar-inner { background: var(--jedi); width: 0%; }
    .side-bar.sith .bar-inner { background: var(--sith); width: 0%; }

    /* ===== RESULTADO ===== */
    #result-section {
      display: none;
      text-align: center;
      animation: cardIn 0.5s ease both;
    }

    .result-icon {
      font-size: 4rem;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 20px currentColor);
    }

    .result-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      margin-bottom: 10px;
      letter-spacing: 3px;
    }
    .result-title.jedi { color: var(--jedi); text-shadow: 0 0 20px rgba(79,195,247,0.5); }
    .result-title.sith { color: var(--sith); text-shadow: 0 0 20px rgba(239,83,80,0.5); }
    .result-title.neutral { color: var(--gold); text-shadow: 0 0 20px rgba(255,232,31,0.4); }

    .result-desc {
      font-size: 1.1rem;
      line-height: 1.7;
      opacity: 0.85;
      max-width: 480px;
      margin: 0 auto 24px;
    }

    .score-display {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 28px;
    }
    .score-box {
      padding: 10px 20px;
      border-radius: 9px;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
    }
    .score-box.jedi { border: 1px solid rgba(79,195,247,0.4); color: var(--jedi); }
    .score-box.sith { border: 1px solid rgba(239,83,80,0.4); color: var(--sith); }
    .score-box span { display: block; font-size: 1.5rem; font-weight: 700; }

    #restart {
      padding: 12px 36px;
      border-radius: 9px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: 0.3s;
    }
    #restart:hover {
      background: rgba(255,232,31,0.1);
      box-shadow: 0 0 16px rgba(255,232,31,0.2);
    }

    /* ===== LIGHTSABER OVERLAY ===== */
    #saber-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5, 7, 15, 0.92);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 28px;
    }
    #saber-overlay.active {
      display: flex;
    }

    .saber-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* empuñadura */
    .saber-hilt {
      width: 22px;
      height: 90px;
      background: linear-gradient(180deg, #aaa 0%, #666 40%, #888 60%, #555 100%);
      border-radius: 4px 4px 6px 6px;
      position: relative;
      box-shadow: 0 0 8px rgba(0,0,0,0.8);
      flex-shrink: 0;
    }
    .saber-hilt::before {
      content: "";
      position: absolute;
      left: -8px;
      top: 18px;
      width: 38px;
      height: 8px;
      background: linear-gradient(90deg, #777, #ccc, #777);
      border-radius: 3px;
    }
    .saber-hilt::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: radial-gradient(circle, #fff 30%, rgba(255,255,255,0.2) 100%);
      border-radius: 50%;
    }

    /* hoja del sable */
    .saber-blade {
      width: 14px;
      height: 0px;              /* empieza en 0, crece con JS */
      border-radius: 6px 6px 0 0;
      order: -1;                /* encima de la empuñadura */
      transition: height 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.9s ease,
                  opacity 0.9s ease;
      opacity: 0;
    }
    .saber-blade.jedi-blade {
      background: linear-gradient(to top, #a5f3a5, #00e676, #69ff88);
      box-shadow:
        0 0 10px #00e676,
        0 0 30px #00e676,
        0 0 60px rgba(0,230,118,0.5);
    }
    .saber-blade.sith-blade {
      background: linear-gradient(to top, #ff8a80, #f44336, #ff1744);
      box-shadow:
        0 0 10px #f44336,
        0 0 30px #f44336,
        0 0 60px rgba(244,67,54,0.5);
    }
    .saber-blade.neutral-blade {
      background: linear-gradient(to top, #fff9c4, #ffe81f, #fff176);
      box-shadow:
        0 0 10px #ffe81f,
        0 0 30px #ffe81f,
        0 0 60px rgba(255,232,31,0.5);
    }

    /* texto debajo */
    .saber-label {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 3px;
      opacity: 0;
      transition: opacity 1s ease 0.8s;
      text-align: center;
    }
    .saber-label.visible { opacity: 1; }

    .saber-skip {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 2px;
      opacity: 0.4;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #eaeaea;
      padding: 7px 18px;
      border-radius: 7px;
      transition: opacity 0.3s;
      margin-top: 10px;
    }
    .saber-skip:hover { opacity: 0.8; }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {
      header { padding: 8px 10px; gap: 8px; }
      header h1 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      header img { width: 40px; }
      .quiz-card { padding: 20px 16px; }
      .intro h2 { font-size: 1.3rem; }
      .result-title { font-size: 1.5rem; }
    }

    /* ===== LANGUAGE OVERLAY ===== */
    #lang-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 120;
      background: rgba(5,7,15,0.88);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
    }
    #lang-overlay.active { display:flex; }

    .lang-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 22px;
      border-radius: 12px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .lang-card h3 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      margin: 0 0 10px;
      letter-spacing: 1px;
    }
    .lang-card p { color: rgba(234,234,234,0.85); margin-bottom: 16px; }
    .lang-options { display:flex; gap:12px; justify-content:center; }
    .lang-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #eaeaea;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }
    .lang-btn:hover { transform: translateY(-4px); border-color: var(--gold); }
  </style>
</head>

<body>

<header>
  <img src="https://loodibee.com/wp-content/uploads/Star-Wars-transparent-logo-1024x1024.png" alt="Star Wars Logo">
  <h1>Holocron Galáctico – Quiz</h1>
</header>

<div class="container">

  <div class="intro">
    <h2>¿Jedi o Sith?</h2>
    <p>Responde con honestidad. La Fuerza ya sabe lo que eres — este quiz solo te lo confirma.</p>
  </div>

  <!-- SECCIÓN QUIZ -->
  <div id="quiz-section">
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label">PREGUNTA 1 DE 10</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="quiz-card">
      <div class="q-number" id="q-number">PREGUNTA 1</div>
      <div id="question"></div>
      <div id="answers"></div>

      <div class="side-indicator">
        <div class="side-bar jedi">
          ⚪ JEDI
          <div class="bar-inner" id="jedi-bar"></div>
        </div>
        <div class="side-bar sith">
          🔴 SITH
          <div class="bar-inner" id="sith-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SECCIÓN RESULTADO -->
  <div id="result-section" class="quiz-card">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <p class="result-desc" id="result-desc"></p>
    <div class="score-display">
      <div class="score-box jedi">JEDI<span id="score-jedi">0</span></div>
      <div class="score-box sith">SITH<span id="score-sith">0</span></div>
    </div>
    <button id="restart">↺ INTENTAR DE NUEVO</button>
  </div>

</div>

<script>
  // ============================================================
  // PREGUNTAS (ES / EN)
  // Mantengo la misma estructura para ambos idiomas.
  // ============================================================
  const QUESTIONS_ES = [
    { question: "Un aldeano inocente está en peligro. ¿Qué haces?", answers: [ { text: "Lo protejo sin importar el costo personal.", points:2 }, { text: "Lo ayudo, pero evalúo primero el riesgo.", points:1 }, { text: "Solo actúo si me beneficia de alguna forma.", points:-1 }, { text: "Su debilidad no es mi problema.", points:-2 } ] },
    { question: "Un enemigo caído te suplica misericordia. ¿Qué decides?", answers: [ { text: "Lo perdono y le ofrezco una segunda oportunidad.", points:2 }, { text: "Lo dejo ir, pero lo vigilo.", points:1 }, { text: "Lo detengo pero no lo mato… por ahora.", points:-1 }, { text: "La misericordia es una debilidad. Lo elimino.", points:-2 } ] },
    { question: "Tienes acceso al poder suficiente para gobernar la galaxia. ¿Qué haces?", answers: [ { text: "Renuncio a él. El poder corrompe.", points:2 }, { text: "Lo uso para establecer paz duradera.", points:1 }, { text: "Lo uso para proteger a los que me importan.", points:-1 }, { text: "Lo tomo. La galaxia necesita un líder fuerte: yo.", points:-2 } ] },
    { question: "Tu maestro te da una orden con la que no estás de acuerdo. ¿Cuál es tu reacción?", answers: [ { text: "La sigo y luego lo debato con respeto.", points:2 }, { text: "Pido explicación antes de obedecer.", points:1 }, { text: "La cuestiono abiertamente y actúo a mi manera.", points:-1 }, { text: "Nadie me da órdenes. Lo supero y tomo el control.", points:-2 } ] },
    { question: "¿Cómo defines la paz?", answers: [ { text: "Armonía entre todos los seres de la galaxia.", points:2 }, { text: "Ausencia de conflicto innecesario.", points:1 }, { text: "Orden impuesto por quienes tienen la razón.", points:-1 }, { text: "La paz es ilusión. Solo el poder es real.", points:-2 } ] },
    { question: "Un amigo traiciona tu confianza por ambición. ¿Cómo reaccionas?", answers: [ { text: "Intento entender sus razones y lo perdono.", points:2 }, { text: "Me alejo con tristeza, pero sin rencor.", points:1 }, { text: "Lo confronto y exijo explicaciones.", points:-1 }, { text: "La traición merece consecuencias. No hay piedad.", points:-2 } ] },
    { question: "Sientes una emoción intensa: ira, miedo, dolor. ¿Qué haces con ella?", answers: [ { text: "La reconozco y la dejo pasar con serenidad.", points:2 }, { text: "La proceso lentamente y aprendo de ella.", points:1 }, { text: "La uso como combustible para actuar.", points:-1 }, { text: "Me entrego a ella. Me da fuerza.", points:-2 } ] },
    { question: "¿Qué representa la Fuerza para ti?", answers: [ { text: "Una energía que une a todos los seres vivos.", points:2 }, { text: "Un don que implica responsabilidad.", points:1 }, { text: "Una herramienta para alcanzar mis metas.", points:-1 }, { text: "Un arma que los débiles no merecen.", points:-2 } ] },
    { question: "¿Cuál es tu opinión sobre el sacrificio personal?", answers: [ { text: "Es el mayor acto de honor que existe.", points:2 }, { text: "Vale la pena si protege algo importante.", points:1 }, { text: "Solo me sacrifico si no hay otra opción.", points:-1 }, { text: "El sacrificio es para los perdedores.", points:-2 } ] },
    { question: "Al final de tu camino, ¿cómo quieres ser recordado?", answers: [ { text: "Como alguien que protegió la vida y la esperanza.", points:2 }, { text: "Como alguien que hizo lo correcto cuando importaba.", points:1 }, { text: "Como alguien que nunca fue derrotado.", points:-1 }, { text: "El miedo es un legado suficiente.", points:-2 } ] }
  ];

  const QUESTIONS_EN = [
    { question: "An innocent villager is in danger. What do you do?", answers: [ { text: "I protect them no matter the personal cost.", points:2 }, { text: "I help, but first assess the risk.", points:1 }, { text: "I act only if it benefits me.", points:-1 }, { text: "Their weakness is not my problem.", points:-2 } ] },
    { question: "A fallen enemy begs for mercy. What do you decide?", answers: [ { text: "I forgive them and offer a second chance.", points:2 }, { text: "I let them go, but I watch them.", points:1 }, { text: "I detain them but don't kill... for now.", points:-1 }, { text: "Mercy is weakness. I eliminate them.", points:-2 } ] },
    { question: "You have the power to rule the galaxy. What do you do?", answers: [ { text: "I renounce it. Power corrupts.", points:2 }, { text: "I use it to establish lasting peace.", points:1 }, { text: "I use it to protect those I care about.", points:-1 }, { text: "I take it. The galaxy needs a strong leader: me.", points:-2 } ] },
    { question: "Your master gives an order you disagree with. How do you react?", answers: [ { text: "I follow it and discuss it respectfully later.", points:2 }, { text: "I ask for an explanation before obeying.", points:1 }, { text: "I openly question it and act my way.", points:-1 }, { text: "No one orders me. I overtake and take control.", points:-2 } ] },
    { question: "How do you define peace?", answers: [ { text: "Harmony among all beings in the galaxy.", points:2 }, { text: "Absence of unnecessary conflict.", points:1 }, { text: "Order imposed by those who are right.", points:-1 }, { text: "Peace is an illusion. Only power is real.", points:-2 } ] },
    { question: "A friend betrays your trust for ambition. How do you react?", answers: [ { text: "I try to understand and forgive them.", points:2 }, { text: "I step away sadly but without bitterness.", points:1 }, { text: "I confront them and demand explanations.", points:-1 }, { text: "Betrayal deserves consequences. No mercy.", points:-2 } ] },
    { question: "You feel intense emotion: anger, fear, pain. What do you do with it?", answers: [ { text: "I acknowledge it and let it pass calmly.", points:2 }, { text: "I process it slowly and learn from it.", points:1 }, { text: "I use it as fuel to act.", points:-1 }, { text: "I give into it. It gives me power.", points:-2 } ] },
    { question: "What does the Force represent to you?", answers: [ { text: "An energy that binds all living things.", points:2 }, { text: "A gift that implies responsibility.", points:1 }, { text: "A tool to achieve my goals.", points:-1 }, { text: "A weapon unfit for the weak.", points:-2 } ] },
    { question: "What is your view on personal sacrifice?", answers: [ { text: "It is the highest act of honor.", points:2 }, { text: "It's worth it if it protects something important.", points:1 }, { text: "I only sacrifice if there is no other option.", points:-1 }, { text: "Sacrifice is for losers.", points:-2 } ] },
    { question: "At the end of your path, how do you want to be remembered?", answers: [ { text: "As someone who protected life and hope.", points:2 }, { text: "As someone who did right when it mattered.", points:1 }, { text: "As someone who was never defeated.", points:-1 }, { text: "Fear is legacy enough.", points:-2 } ] }
  ];

  // ============================================================
  // LÓGICA DEL QUIZ
  // Se cargará una vez el usuario elija idioma.
  // ============================================================
  let currentQ  = 0;
  let jediScore = 0;
  let sithScore = 0;
  let LANG = 'es';
  let QUESTIONS = QUESTIONS_ES;
  let total = QUESTIONS.length;

  const questionEl    = document.getElementById('question');
  const answersEl     = document.getElementById('answers');
  const qNumberEl     = document.getElementById('q-number');
  const progressLabel = document.getElementById('progress-label');
  const progressFill  = document.getElementById('progress-fill');
  const jediBar       = document.getElementById('jedi-bar');
  const sithBar       = document.getElementById('sith-bar');
  const quizSection   = document.getElementById('quiz-section');
  const resultSection = document.getElementById('result-section');

  // language overlay elements
  const langOverlay = document.createElement('div');
  langOverlay.id = 'lang-overlay';
  langOverlay.innerHTML = `
    <div class="lang-card">
      <h3>Selecciona idioma / Choose language</h3>
      <p>Selecciona el idioma para el quiz · Select the language for the quiz</p>
      <div class="lang-options">
        <button class="lang-btn" id="lang-es">🇪🇸 Español</button>
        <button class="lang-btn" id="lang-en">🇺🇸 English</button>
      </div>
    </div>
  `;
  document.body.appendChild(langOverlay);

  const langBtnES = document.getElementById('lang-es');
  const langBtnEN = document.getElementById('lang-en');

  // (LANG, QUESTIONS and total already declared above)

  const TRANSLATIONS = {
    es: {
      header: 'Holocron Galáctico – Quiz',
      introTitle: '¿Jedi o Sith?',
      introDesc: 'Responde con honestidad. La Fuerza ya sabe lo que eres — este quiz solo te lo confirma.',
      questionLabel: (i, t) => `PREGUNTA ${i} DE ${t}`,
      qNumber: i => `PREGUNTA ${i}`,
      jediLabel: '⚪ JEDI',
      sithLabel: '🔴 SITH',
      restart: '↺ INTENTAR DE NUEVO',
      saberSkip: 'CONTINUAR →',
      saber_label_jedi: 'QUE LA FUERZA TE ACOMPAÑE',
      saber_label_sith: 'LA OSCURIDAD TE RECLAMA',
      saber_label_neutral: 'EL EQUILIBRIO ERES TÚ',
      result: {
        guardian_title: 'GUARDIÁN JEDI',
        guardian_desc: 'La Fuerza fluye en ti con claridad y propósito. Tu paciencia, compasión y desapego del poder te elevan como verdadero guardián de la galaxia. El Consejo Jedi te recibirá con los brazos abiertos.',
        committed_title: 'JEDI COMPROMETIDO',
        committed_desc: 'Caminas en la Luz, aunque la oscuridad te ronda. Tus valores son sólidos pero las tentaciones no te son ajenas. Sigue tu entrenamiento y la sombra no te alcanzará.',
        lord_title: 'SEÑOR SITH',
        lord_desc: 'La oscuridad te consume y la abrazas sin reservas. Tu sed de poder y tu desprecio por la debilidad te convierten en una amenaza para toda la galaxia. La República tiembla ante tu presencia.',
        apprentice_title: 'APRENDIZ SITH',
        apprentice_desc: 'El lado oscuro te seduce y ya has cedido varias veces a él. Tu ambición supera tu templanza. Un Maestro Sith te encontraría un aprendiz prometedor… y peligroso.',
        neutral_title: 'EQUILIBRIO EN LA FUERZA',
        neutral_desc: 'Ni completamente Jedi ni completamente Sith. Eres el punto de equilibrio que las profecías predicen. Pocos logran caminar esta línea sin caer. La galaxia entera depende de tu elección final.'
      }
    },
    en: {
      header: 'Galactic Holocron – Quiz',
      introTitle: 'Jedi or Sith?',
      introDesc: 'Answer honestly. The Force already knows who you are — this quiz only confirms it.',
      questionLabel: (i, t) => `QUESTION ${i} OF ${t}`,
      qNumber: i => `QUESTION ${i}`,
      jediLabel: '⚪ JEDI',
      sithLabel: '🔴 SITH',
      restart: '↺ TRY AGAIN',
      saberSkip: 'CONTINUE →',
      saber_label_jedi: 'MAY THE FORCE BE WITH YOU',
      saber_label_sith: 'THE DARKNESS CALLS YOU',
      saber_label_neutral: 'BALANCE IS YOU',
      result: {
        guardian_title: 'JEDI GUARDIAN',
        guardian_desc: 'The Force flows through you with clarity and purpose. Your patience, compassion and lack of lust for power mark you as a true guardian of the galaxy. The Jedi Council would welcome you.',
        committed_title: 'COMMITTED JEDI',
        committed_desc: 'You walk in the Light, though darkness tempts you. Your values are strong but temptations reach you. Continue your training and the shadow will not catch you.',
        lord_title: 'SITH LORD',
        lord_desc: 'Darkness consumes you and you embrace it without reservation. Your thirst for power and contempt for weakness make you a threat to the galaxy. The Republic trembles at your presence.',
        apprentice_title: 'SITH APPRENTICE',
        apprentice_desc: 'The dark side seduces you and you have given into it several times. Your ambition outweighs your temperance. A Sith Master would find a promising… and dangerous apprentice in you.',
        neutral_title: 'BALANCE IN THE FORCE',
        neutral_desc: 'Neither fully Jedi nor fully Sith. You are the point of balance the prophecies speak of. Few walk this line without falling. The whole galaxy depends on your final choice.'
      }
    }
  };

  function applyLanguage(lang) {
    LANG = lang;
    QUESTIONS = (lang === 'en') ? QUESTIONS_EN : QUESTIONS_ES;
    total = QUESTIONS.length;

    document.querySelector('header h1').textContent = TRANSLATIONS[lang].header;
    document.querySelector('.intro h2').textContent = TRANSLATIONS[lang].introTitle;
    document.querySelector('.intro p').textContent = TRANSLATIONS[lang].introDesc;
    document.getElementById('restart').textContent = TRANSLATIONS[lang].restart;
    document.getElementById('saber-skip').textContent = TRANSLATIONS[lang].saberSkip;
    // side labels
    document.querySelector('.side-bar.jedi').childNodes[0].nodeValue = TRANSLATIONS[lang].jediLabel + '\n';
    document.querySelector('.side-bar.sith').childNodes[0].nodeValue = TRANSLATIONS[lang].sithLabel + '\n';

    // reload first question in selected language
    currentQ = 0;
    jediScore = 0;
    sithScore = 0;
    jediBar.style.width = '0%';
    sithBar.style.width = '0%';
    // hide result if visible
    resultSection.style.display = 'none';
    quizSection.style.display = 'block';
    loadQuestion();
  }

  // show overlay on load
  function showLangOverlay() {
    langOverlay.classList.add('active');
  }

  langBtnES.addEventListener('click', () => {
    langOverlay.classList.remove('active');
    applyLanguage('es');
  });
  langBtnEN.addEventListener('click', () => {
    langOverlay.classList.remove('active');
    applyLanguage('en');
  });

  function shuffle(arr) {
    return arr.slice().sort(() => Math.random() - 0.5);
  }

  function loadQuestion() {
    const q = QUESTIONS[currentQ];
    questionEl.textContent = q.question;
    qNumberEl.textContent  = TRANSLATIONS[LANG].qNumber(currentQ + 1);
    progressLabel.textContent = TRANSLATIONS[LANG].questionLabel(currentQ + 1, total);
    progressFill.style.width  = `${(currentQ / total) * 100}%`;

    answersEl.innerHTML = '';
    const shuffled = shuffle(q.answers);
    shuffled.forEach(opt => {
      const btn = document.createElement('button');
      btn.textContent = opt.text;
      btn.addEventListener('click', () => selectAnswer(opt.points, btn));
      answersEl.appendChild(btn);
    });
  }

  function updateBars() {
    const maxPossible = total * 2;
    const jPct = Math.round((jediScore / maxPossible) * 100);
    const sPct = Math.round((sithScore / maxPossible) * 100);
    jediBar.style.width = `${jPct}%`;
    sithBar.style.width = `${sPct}%`;
  }

  function selectAnswer(points, btn) {
    // deshabilitar todos los botones
    answersEl.querySelectorAll('button').forEach(b => b.disabled = true);

    if (points > 0) {
      jediScore += points;
      btn.style.borderColor = 'var(--jedi)';
      btn.style.background  = 'rgba(79,195,247,0.12)';
    } else {
      sithScore += Math.abs(points);
      btn.style.borderColor = 'var(--sith)';
      btn.style.background  = 'rgba(239,83,80,0.12)';
    }

    updateBars();

    setTimeout(() => {
      currentQ++;
      if (currentQ < total) {
        loadQuestion();
      } else {
        showResult();
      }
    }, 500);
  }

  function showSaberAnimation(side, onDone) {
    const overlay = document.getElementById('saber-overlay');
    const blade   = document.getElementById('saber-blade');
    const label   = document.getElementById('saber-label');
    const audio   = document.getElementById('saber-audio');
    const skip    = document.getElementById('saber-skip');

    // configurar según lado
    blade.className = 'saber-blade';
    if (side === 'jedi') {
      blade.classList.add('jedi-blade');
      label.textContent = TRANSLATIONS[LANG].saber_label_jedi;
      label.style.color = '#00e676';
    } else if (side === 'sith') {
      blade.classList.add('sith-blade');
      label.textContent = TRANSLATIONS[LANG].saber_label_sith;
      label.style.color = '#f44336';
    } else {
      blade.classList.add('neutral-blade');
      label.textContent = TRANSLATIONS[LANG].saber_label_neutral;
      label.style.color = '#ffe81f';
    }

    overlay.classList.add('active');

    // reproducir sonido
    audio.currentTime = 0;
    audio.play().catch(() => {});

    // activar hoja con delay pequeño
    setTimeout(() => {
      blade.style.height  = '280px';
      blade.style.opacity = '1';
    }, 120);

    // mostrar texto
    setTimeout(() => {
      label.classList.add('visible');
    }, 300);

    // cerrar overlay
    function closeSaber() {
      overlay.classList.remove('active');
      blade.style.height  = '0px';
      blade.style.opacity = '0';
      label.classList.remove('visible');
      onDone();
    }

    // auto-cerrar a los 3.5s
    const autoClose = setTimeout(closeSaber, 3500);

    skip.onclick = () => {
      clearTimeout(autoClose);
      closeSaber();
    };
  }

  function showResult() {
    quizSection.style.display  = 'none';
    progressFill.style.width = '100%';

    const diff = jediScore - sithScore;
    let side = 'neutral';
    if (diff > 1)  side = 'jedi';
    if (diff < -1) side = 'sith';

    // primero la animación, luego el resultado
    showSaberAnimation(side, () => {
      resultSection.style.display = 'block';

      document.getElementById('score-jedi').textContent = jediScore;
      document.getElementById('score-sith').textContent = sithScore;

      const iconEl  = document.getElementById('result-icon');
      const titleEl = document.getElementById('result-title');
      const descEl  = document.getElementById('result-desc');

      if (diff > 4) {
        iconEl.textContent  = '🔵';
        titleEl.textContent = TRANSLATIONS[LANG].result.guardian_title;
        titleEl.className   = 'result-title jedi';
        descEl.textContent  = TRANSLATIONS[LANG].result.guardian_desc;
      } else if (diff > 1) {
        iconEl.textContent  = '🔵';
        titleEl.textContent = TRANSLATIONS[LANG].result.committed_title;
        titleEl.className   = 'result-title jedi';
        descEl.textContent  = TRANSLATIONS[LANG].result.committed_desc;
      } else if (diff < -4) {
        iconEl.textContent  = '🔴';
        titleEl.textContent = TRANSLATIONS[LANG].result.lord_title;
        titleEl.className   = 'result-title sith';
        descEl.textContent  = TRANSLATIONS[LANG].result.lord_desc;
      } else if (diff < -1) {
        iconEl.textContent  = '🔴';
        titleEl.textContent = TRANSLATIONS[LANG].result.apprentice_title;
        titleEl.className   = 'result-title sith';
        descEl.textContent  = TRANSLATIONS[LANG].result.apprentice_desc;
      } else {
        iconEl.textContent  = '⚫';
        titleEl.textContent = TRANSLATIONS[LANG].result.neutral_title;
        titleEl.className   = 'result-title neutral';
        descEl.textContent  = TRANSLATIONS[LANG].result.neutral_desc;
      }
    });
  }

  document.getElementById('restart').addEventListener('click', () => {
    currentQ  = 0;
    jediScore = 0;
    sithScore = 0;
    jediBar.style.width = '0%';
    sithBar.style.width = '0%';
    resultSection.style.display = 'none';
    quizSection.style.display   = 'block';
    loadQuestion();
  });

  // Iniciar
  showLangOverlay();
</script>

<!-- ===== SABER OVERLAY ===== -->
<div id="saber-overlay">
  <div class="saber-wrap">
    <div class="saber-blade" id="saber-blade"></div>
    <div class="saber-hilt"></div>
  </div>
  <div class="saber-label" id="saber-label"></div>
  <button class="saber-skip" id="saber-skip">CONTINUAR →</button>
</div>

<audio id="saber-audio" src="animacionfinal.mp3" preload="auto"></audio>

</body>
</html>
